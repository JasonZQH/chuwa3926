# Default database profile.
# Change this to "mysql" or pass --spring.profiles.active=mysql at startup
# when you want to run the project against MySQL instead.
spring.profiles.active=postgres

# Shared JPA behavior for all database profiles.
spring.jpa.hibernate.ddl-auto=update

# Local HTTPS settings using a self-signed certificate.
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:redbook-local.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=changeit
server.ssl.key-alias=redbook-local

# Local HTTP port that will redirect all traffic to HTTPS.
app.http.port=8080

# Actuator, JMX
management.endpoints.web.exposure.include=*

## Spring Security
#spring.security.user.name=chuwa
#spring.security.user.password=chuwa
#spring.security.user.roles=ADMIN

## App Properties
app.jwt-secret= JWTSecretKey
app.jwt-expiration-milliseconds = 604800000

# Shared logging configuration.
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR
logging.level.com.chuwa=DEBUG

# Keep this strategy for Springfox compatibility on Spring Boot 2.6+.
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
